name: Build staging APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug-signed APK + publish to staging-latest release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*-debug.apk" | head -1)
          test -n "$APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          cp "$APK" loopr-player-staging.apk
          ls -la loopr-player-staging.apk

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopr-player-staging
          path: loopr-player-staging.apk
          retention-days: 30

      - name: Publish / refresh staging-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging-latest
          name: Loopr Player — staging (latest)
          body: |
            Auto-built debug APK from commit ${{ github.sha }}.

            Install instructions: https://loopr.studio/install
          files: loopr-player-staging.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
